services:
  # Django Web Service
  - type: web
    name: pulse-aid-backend
    env: python
    buildCommand: "./scripts/build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulse-aid-db
          property: connectionString
      - key: REDIS_URL
        sync: false # You will paste the Upstash URL here
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: pulse-aid-db
    user: pulse_aid_user
    plan: free
