services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./matching-engine/.env
    depends_on:
      - matching-engine

  matching-engine:
    build: ./matching-engine
    ports:
      - "9000:9000"
    volumes:
      - ./matching-engine:/app
    env_file:
      - ./matching-engine/.env

networks:
  default:
    name: bloodreach-network
